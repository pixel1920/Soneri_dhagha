<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONERI DHAGA - Premium Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,600;0,700;1,500&family=Poppins:wght=300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFF0F2 0%, #FCE4E6 100%); 
            color: #2d3748;
            padding: 20px 15px;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: #4A0E17;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
            width: 100%;
            max-width: max-content;
        }

        header h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 70%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
        }

        /* Filter Section Styling */
        .filter-section {
            background: rgba(255, 255, 255, 0.8px);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(74, 14, 23, 0.1);
        }

        .filter-section label {
            font-weight: 600;
            color: #4A0E17;
            font-size: 14px;
        }

        .select-input {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #f3dcd0;
            font-family: 'Poppins', sans-serif;
            background-color: #fff;
            color: #2d3748;
            font-weight: 500;
            outline: none;
            cursor: pointer;
        }

        .select-input:focus {
            border-color: #4A0E17;
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        @media (min-width: 576px) {
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 992px) {
            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(74, 14, 23, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(74, 14, 23, 0.08);
        }

        .stat-card.total-sales { border-top: 4px solid #3182ce; }
        .stat-card.total-cost { border-top: 4px solid #dd6b20; }
        .stat-card.profit { border-top: 4px solid #38a169; }
        .stat-card.loss { border-top: 4px solid #e53e3e; }

        .stat-card h3 {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (min-width: 992px) {
            .main-content {
                grid-template-columns: 1fr 1.7fr;
                gap: 32px;
            }
            body { padding: 40px 20px; }
            header h1 { font-size: 42px; letter-spacing: 3px; }
            .stat-card p { font-size: 28px; }
        }

        .form-section, .table-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 14, 23, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        @media (min-width: 768px) {
            .form-section, .table-section { padding: 35px; }
        }

        .form-section h2, .table-section h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
            font-size: 20px;
            color: #4A0E17;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .form-section h2, .table-section h2 {
                font-size: 22px;
                margin-bottom: 25px;
            }
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            color: #4a5568;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #f3dcd0;
            border-radius: 10px;
            font-size: 14px;
            color: #2d3748;
            background-color: #fffafb;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4A0E17;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 14, 23, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #4A0E17 0%, #6B1724 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 15px rgba(74, 14, 23, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 14, 23, 0.3);
            opacity: 0.95;
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: -8px;
            min-width: 700px;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            color: #718096;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #edf2f7;
        }

        td {
            padding: 14px 16px;
            background-color: #fffcfd;
            border-top: 1px solid #fbf0f2;
            border-bottom: 1px solid #fbf0f2;
            font-size: 13px;
            color: #4a5568;
        }

        td:first-child {
            border-left: 1px solid #fbf0f2;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            font-weight: 600;
            color: #2d3748;
        }

        td:last-child {
            border-right: 1px solid #fbf0f2;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            text-align: center;
        }

        tr:hover td { background-color: #fcebeb; }

        .text-success { color: #2f855a; font-weight: 600; }
        .text-danger { color: #c53030; font-weight: 600; }
        .badge-profit { background-color: #c6f6d5; padding: 4px 8px; border-radius: 6px; }
        .badge-loss { background-color: #fed7d7; padding: 4px 8px; border-radius: 6px; }

        .btn-delete {
            background-color: transparent;
            color: #e53e3e;
            border: 1px solid #fed7d7;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background-color: #e53e3e;
            color: #fff;
            border-color: #e53e3e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SONERI DHAGA</h1>
    </header>

    <!-- महिना निवडण्यासाठी मुख्य फिल्टर -->
    <div class="filter-section">
        <label for="viewMonthFilter">Select Month to View Dashboard:</label>
        <input type="month" id="viewMonthFilter" class="select-input">
    </div>

    <div class="stats-container">
        <div class="stat-card total-sales">
            <h3>Total Sales (<span class="current-selected-month">Month</span>)</h3>
            <p id="totalSales">₹0.00</p>
        </div>
        <div class="stat-card total-cost">
            <h3>Total Cost (<span class="current-selected-month">Month</span>)</h3>
            <p id="totalCost">₹0.00</p>
        </div>
        <div class="stat-card" id="netProfitCard">
            <h3 id="netProfitLabel">Net Profit / Loss</h3>
            <p id="netProfit">₹0.00</p>
        </div>
    </div>

    <div class="main-content">
        <div class="form-section">
            <h2>Create New Invoice</h2>
            <form id="billingForm">
                <!-- तारीख निवडण्यासाठी नवीन इनपुट -->
                <div class="form-group">
                    <label for="invoiceDate">Invoice Date</label>
                    <input type="date" id="invoiceDate" required>
                </div>
                <div class="form-group">
                    <label for="customerName">Customer Name</label>
                    <input type="text" id="customerName" required placeholder="e.g. Aditi Patil">
                </div>
                <div class="form-group">
                    <label for="productName">Product / Service Description</label>
                    <input type="text" id="productName" required placeholder="e.g. Bridal Blouse Design">
                </div>
                <div class="form-group">
                    <label for="costPrice">Cost Price (₹)</label>
                    <input type="number" id="costPrice" min="0" required placeholder="Material & labor raw costs">
                </div>
                <div class="form-group">
                    <label for="sellingPrice">Selling Price (₹)</label>
                    <input type="number" id="sellingPrice" min="0" required placeholder="Final amount billed">
                </div>
                <button type="submit" class="btn-submit">Generate Bill</button>
            </form>
        </div>

        <div class="table-section">
            <h2>Billing History (<span class="current-selected-month">Month</span>)</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Product / Service</th>
                            <th>Cost Basis</th>
                            <th>Sale Value</th>
                            <th>Net Margin</th>
                            <th style="text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="billingTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('soneriDhagaTransactions')) || [];

    const billingForm = document.getElementById('billingForm');
    const billingTableBody = document.getElementById('billingTableBody');
    
    const totalSalesEl = document.getElementById('totalSales');
    const totalCostEl = document.getElementById('totalCost');
    const netProfitEl = document.getElementById('netProfit');
    const netProfitCard = document.getElementById('netProfitCard');
    const netProfitLabel = document.getElementById('netProfitLabel');
    const viewMonthFilter = document.getElementById('viewMonthFilter');
    const invoiceDateInput = document.getElementById('invoiceDate');
    const monthLabels = document.querySelectorAll('.current-selected-month');

    // चालू महिना आणि आजची तारीख डिफॉल्ट सेट करणे (YYYY-MM)
    const today = new Date();
    const currentYearMonth = today.toISOString().substring(0, 7); // "2026-06"
    const currentFullDate = today.toISOString().substring(0, 10); // "2026-06-27"
    
    viewMonthFilter.value = currentYearMonth;
    invoiceDateInput.value = currentFullDate;

    function formatIndianCurrency(amount) {
        return '₹' + amount.toLocaleString('en-IN', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function formatMonthDisplay(yearMonthStr) {
        if(!yearMonthStr) return "";
        const [year, month] = yearMonthStr.split('-');
        const dateObj = new Date(year, month - 1);
        return dateObj.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    }

    // महिना बदलल्यावर स्क्रीन अपडेट करणे
    viewMonthFilter.addEventListener('change', updateUI);

    billingForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const invoiceDate = document.getElementById('invoiceDate').value; // YYYY-MM-DD
        const customerName = document.getElementById('customerName').value;
        const productName = document.getElementById('productName').value;
        const costPrice = parseFloat(document.getElementById('costPrice').value);
        const sellingPrice = parseFloat(document.getElementById('sellingPrice').value);

        const singleProfitLoss = sellingPrice - costPrice;
        
        // प्रत्येक बिलामध्ये आता त्याची 'तारीख' आणि 'महिना' (YYYY-MM) देखील सेव्ह होईल
        const billMonth = invoiceDate.substring(0, 7); 

        const transaction = {
            id: Date.now(), // युनिक आयडी डिलीट सुलभ करण्यासाठी
            invoiceDate,
            billMonth,
            customerName,
            productName,
            costPrice,
            sellingPrice,
            profitLoss: singleProfitLoss
        };

        transactions.push(transaction);
        localStorage.setItem('soneriDhagaTransactions', JSON.stringify(transactions));
        
        // फॉर्म रिसेट करून तारीख आजचीच ठेवणे
        billingForm.reset();
        invoiceDateInput.value = currentFullDate;
        
        // जर युझरने बिल भरताना दुसरा महिना निवडला असेल, तर डॅशबोर्ड आपोआप त्या महिन्यात शिफ्ट होईल
        viewMonthFilter.value = billMonth;
        
        updateUI();
    });

    function deleteTransaction(id) {
        if(confirm("तुम्हाला हे बिल नक्की डिलीट करायचे आहे का?")) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('soneriDhagaTransactions', JSON.stringify(transactions));
            updateUI();
        }
    }

    function updateUI() {
        billingTableBody.innerHTML = '';
        const selectedMonth = viewMonthFilter.value; // "2026-06"
        
        // स्क्रीनवरील महिन्यांची नावे बदलणे
        const formattedMonthText = formatMonthDisplay(selectedMonth);
        monthLabels.forEach(label => label.innerText = formattedMonthText);

        let totalSales = 0;
        let totalCost = 0;

        // फक्त निवडलेल्या महिन्याचा डेटा फिल्टर करणे
        const filteredTransactions = transactions.filter(t => t.billMonth === selectedMonth);

        if (filteredTransactions.length === 0) {
            totalSalesEl.innerText = formatIndianCurrency(0);
            totalCostEl.innerText = formatIndianCurrency(0);
            netProfitEl.innerText = formatIndianCurrency(0);
            netProfitCard.className = 'stat-card';
            netProfitLabel.innerText = "Net Profit / Loss";
            netProfitEl.className = '';
            
            const emptyRow = document.createElement('tr');
            emptyRow.innerHTML = `<td colspan="6" style="text-align:center; color:#a0aec0; padding:30px;">या महिन्यामध्ये कोणताही डेटा उपलब्ध नाही.</td>`;
            billingTableBody.appendChild(emptyRow);
            return;
        }

        filteredTransactions.forEach((t) => {
            totalSales += t.sellingPrice;
            totalCost += t.costPrice;

            const row = document.createElement('tr');
            const profitLossClass = t.profitLoss >= 0 ? 'text-success' : 'text-danger';
            const badgeClass = t.profitLoss >= 0 ? 'badge-profit' : 'badge-loss';
            
            const structuredValue = formatIndianCurrency(Math.abs(t.profitLoss));
            const profitLossSign = t.profitLoss >= 0 ? `+${structuredValue}` : `-${structuredValue}`;

            row.innerHTML = `
                <td>${t.customerName}<br><small style="color:#a0aec0;">${t.invoiceDate}</small></td>
                <td>${t.productName}</td>
                <td>${formatIndianCurrency(t.costPrice)}</td>
                <td>${formatIndianCurrency(t.sellingPrice)}</td>
                <td><span class="${badgeClass} ${profitLossClass}">${profitLossSign}</span></td>
                <td><button class="btn-delete" onclick="deleteTransaction(${t.id})">🗑️ Delete</button></td>
            `;
            billingTableBody.appendChild(row);
        });

        const netProfitLoss = totalSales - totalCost;

        totalSalesEl.innerText = formatIndianCurrency(totalSales);
        totalCostEl.innerText = formatIndianCurrency(totalCost);
        netProfitEl.innerText = formatIndianCurrency(Math.abs(netProfitLoss));

        if (netProfitLoss >= 0) {
            netProfitCard.className = 'stat-card profit';
            netProfitLabel.innerText = "Net Profit";
            netProfitEl.className = 'text-success';
        } else {
            netProfitCard.className = 'stat-card loss';
            netProfitLabel.innerText = "Net Loss";
            netProfitEl.className = 'text-danger';
        }
    }

    // सुरुवातीला UI लोड करणे
    updateUI();
</script>

</body>
</html>
