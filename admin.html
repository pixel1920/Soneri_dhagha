<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONERI DHAGA | Admin Control Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f4f6f9; color:#333; padding:20px; }
        .login-box, .admin-box { max-width:600px; margin:50px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.05); border-top: 5px solid #4A0E17; }
        h2 { color:#4A0E17; margin-bottom:20px; text-align:center; }
        .form-group { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; font-weight:500; font-size:14px; }
        input, select { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px; }
        button { width:100%; padding:10px; background:#4A0E17; color:#fff; border:none; border-radius:6px; font-weight:600; font-size:15px; cursor:pointer; margin-top:10px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .hidden { display:none; }
        .product-list-item { display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; }
        
        /* Action Buttons */
        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background:#3182ce; padding:6px 12px; font-size:12px; width:auto; margin:0; }
        .del-btn { background:#e53e3e; padding:6px 12px; font-size:12px; width:auto; margin:0; }
        
        .shop-link-btn { background: #D4AF37; color: #4A0E17; margin-bottom: 25px; padding: 12px; }
        .upload-helper { background: #fffde6; border: 1px dashed #d4af37; padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        .upload-helper a { color: #4A0E17; font-weight: 600; text-decoration: underline; }
        
        /* Edit Modal Section */
        #editSection { background: #eaf4ff; border: 1px dashed #3182ce; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: none; }
    </style>
</head>
<body>

<!-- Login Section -->
<div class="login-box" id="loginBox">
    <h2>🔒 Admin Login</h2>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
    </div>
    <div class="form-group">
        <label>Passkey</label>
        <input type="password" id="passkey" placeholder="Enter Passkey">
    </div>
    <button onclick="handleLogin()" style="padding:12px;">Login to Dashboard</button>
</div>

<!-- Admin Panel Section -->
<div class="admin-box hidden" id="adminBox">
    <h2>🛠️ Soneri Dhaga Admin Panel</h2>
    
    <a href="shop.html" style="text-decoration: none;">
        <button class="shop-link-btn">🛒 Go To Shop</button>
    </a>
    
    <p style="text-align:center; margin-bottom:20px; font-size:14px; color:#666;">Add, Edit or Remove products</p>
    
    <!-- Edit Product Section (Hidden by Default) -->
    <div id="editSection">
        <h3 style="font-size:16px; color:#3182ce; margin-bottom:15px;">✏️ Edit Product</h3>
        <input type="hidden" id="eId">
        <div class="form-group">
            <label>Product Title</label>
            <input type="text" id="eTitle">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="eCategory">
                <option value="saree">Saree Collection</option>
                <option value="blouse">Blouse Piece</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1;">
                <label>Selling Price (₹)</label>
                <input type="number" id="ePrice">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Original Price (₹)</label>
                <input type="number" id="eOldPrice">
            </div>
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="eImg">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button onclick="saveEdit()" style="background: #3182ce;">✅ Save Changes</button>
            <button onclick="cancelEdit()" style="background: #718096;">❌ Cancel</button>
        </div>
    </div>

    <!-- Add New Product Section -->
    <div style="background:#fff5f6; padding:20px; border-radius:8px; margin-bottom:25px;" id="addSection">
        <h3 style="font-size:16px; color:#4A0E17; margin-bottom:15px;">➕ Add New Product</h3>
        <div class="form-group">
            <label>Product Title</label>
            <input type="text" id="pTitle" placeholder="e.g., Paithani Silk Saree">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="pCategory">
                <option value="saree">Saree Collection</option>
                <option value="blouse">Blouse Piece</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1;">
                <label>Selling Price (₹)</label>
                <input type="number" id="pPrice" placeholder="e.g., 2500">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Original Price (₹)</label>
                <input type="number" id="pOldPrice" placeholder="e.g., 3500">
            </div>
        </div>
        
        <div class="form-group">
            <label>Product Image</label>
            <div class="upload-helper">
                <p style="font-size: 13px; margin-bottom: 5px; color: #555;">📸 Upload image from your device here:</p>
                <a href="https://imgur.com/upload" target="_blank">👉 Click Here to Upload Image 👈</a>
                <p style="font-size: 11px; color: #777; margin-top: 5px;">(Copy the uploaded image link and paste below)</p>
            </div>
            <input type="text" id="pImg" placeholder="Paste the uploaded image link here">
        </div>

        <button onclick="addProduct()" style="padding:12px;">Upload Product Live 🚀</button>
    </div>

    <h3>📦 Active Products in Shop:</h3>
    <div id="adminProductList" style="margin-top:10px; border:1px solid #eee; border-radius:8px; background:#fff;"></div>
    
    <button onclick="handleLogout()" style="background:#718096; margin-top:30px; padding:12px;">Logout</button>
</div>

<script>
    const ADMIN_USER = "Neha1920";
    const ADMIN_PASS = "Neha@7057815526";

    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('passkey').value;

        if(user === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('adminBox').classList.remove('hidden');
            loadAdminProducts();
        } else {
            alert("Incorrect Username or Passkey! Please try again.");
        }
    }

    function handleLogout() {
        document.getElementById('username').value = '';
        document.getElementById('passkey').value = '';
        document.getElementById('adminBox').classList.add('hidden');
        document.getElementById('loginBox').classList.remove('hidden');
    }

    // --- ADD PRODUCT ---
    function addProduct() {
        const title = document.getElementById('pTitle').value;
        const category = document.getElementById('pCategory').value;
        const price = document.getElementById('pPrice').value;
        const originalPrice = document.getElementById('pOldPrice').value;
        const img = document.getElementById('pImg').value;

        if(!title || !price) {
            alert("Please provide at least a title and a selling price!");
            return;
        }

        let products = JSON.parse(localStorage.getItem('soneri_products')) || [];
        
        const newProduct = {
            id: Date.now(),
            title: title,
            category: category,
            price: parseInt(price),
            originalPrice: originalPrice ? parseInt(originalPrice) : parseInt(price),
            img: img || "https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=400"
        };

        products.push(newProduct);
        localStorage.setItem('soneri_products', JSON.stringify(products));
        
        document.getElementById('pTitle').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pOldPrice').value = '';
        document.getElementById('pImg').value = '';

        alert("Product uploaded successfully and is now live! 🎉");
        loadAdminProducts();
    }

    // --- EDIT PRODUCT ---
    function editProduct(id) {
        let products = JSON.parse(localStorage.getItem('soneri_products')) || [];
        let product = products.find(p => p.id === id);
        
        if(product) {
            document.getElementById('eId').value = product.id;
            document.getElementById('eTitle').value = product.title;
            document.getElementById('eCategory').value = product.category;
            document.getElementById('ePrice').value = product.price;
            document.getElementById('eOldPrice').value = product.originalPrice;
            document.getElementById('eImg').value = product.img || "";
            
            // Show Edit Section and scroll to it
            document.getElementById('editSection').style.display = 'block';
            window.scrollTo({ top: document.getElementById('editSection').offsetTop - 20, behavior: 'smooth' });
        }
    }

    function cancelEdit() {
        document.getElementById('editSection').style.display = 'none';
    }

    function saveEdit() {
        let id = parseInt(document.getElementById('eId').value);
        let title = document.getElementById('eTitle').value;
        let price = document.getElementById('ePrice').value;

        if(!title || !price) {
            alert("Title and Price cannot be empty!");
            return;
        }

        let products = JSON.parse(localStorage.getItem('soneri_products')) || [];
        let index = products.findIndex(p => p.id === id);
        
        if(index !== -1) {
            products[index].title = title;
            products[index].category = document.getElementById('eCategory').value;
            products[index].price = parseInt(price);
            products[index].originalPrice = parseInt(document.getElementById('eOldPrice').value) || parseInt(price);
            products[index].img = document.getElementById('eImg').value;
            
            localStorage.setItem('soneri_products', JSON.stringify(products));
            alert("Product details updated successfully! ✅");
            
            cancelEdit();
            loadAdminProducts();
        }
    }

    // --- DELETE PRODUCT ---
    function deleteProduct(id) {
        if(confirm("Are you sure you want to remove this product from the shop?")) {
            let products = JSON.parse(localStorage.getItem('soneri_products')) || [];
            products = products.filter(p => p.id !== id);
            localStorage.setItem('soneri_products', JSON.stringify(products));
            loadAdminProducts();
        }
    }

    // --- LOAD PRODUCTS ---
    function loadAdminProducts() {
        const listContainer = document.getElementById('adminProductList');
        listContainer.innerHTML = '';
        let products = JSON.parse(localStorage.getItem('soneri_products')) || [];

        if(products.length === 0) {
            listContainer.innerHTML = `<p style="padding:15px; text-align:center; color:#999;">No products available in the shop.</p>`;
            return;
        }

        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'product-list-item';
            div.innerHTML = `
                <div>
                    <strong>${p.title}</strong> <span style="font-size:12px; color:#718096;">(${p.category === 'saree' ? 'Saree' : 'Blouse'})</span><br>
                    <span style="color:#4A0E17; font-weight:600;">₹${p.price}</span>
                </div>
                <div class="action-btns">
                    <button class="edit-btn" onclick="editProduct(${p.id})">Edit</button>
                    <button class="del-btn" onclick="deleteProduct(${p.id})">Delete</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }
</script>
</body>
</html>
